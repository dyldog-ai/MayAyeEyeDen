name: Probe clean clone
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: macos-latest
    steps:
      # NOTE: deliberately NO actions/checkout here, to avoid any injected credential.
      - name: Inspect any pre-existing credential config
        run: |
          echo "==== git config --list --show-origin (credential/url/extraheader) ===="
          git config --list --show-origin 2>/dev/null | grep -iE 'credential|extraheader|insteadof|http\.' || echo "(none)"
          echo "==== env GITHUB_TOKEN set? ===="
          if [ -n "${GITHUB_TOKEN:-}" ]; then echo "GITHUB_TOKEN IS set in env"; else echo "GITHUB_TOKEN NOT in env"; fi

      - name: Anonymous clone of a PUBLIC repo (no checkout, no helper)
        continue-on-error: true
        run: |
          echo "==== C) TRULY ANONYMOUS clone (no checkout, force helper off, no GITHUB_TOKEN) ===="
          unset GITHUB_TOKEN
          rm -rf /tmp/aapC
          GIT_TERMINAL_PROMPT=0 git -c credential.helper= -c http.extraheader= \
            clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aapC 2>&1 | tail -5 \
            && echo "C_OK" || echo "C_FAIL"
          rm -rf /tmp/aapC

      - name: Anonymous clone with GIT_CONFIG_NOSYSTEM and HOME empty
        continue-on-error: true
        run: |
          echo "==== D) ANONYMOUS clone in sterile HOME + no system config ===="
          unset GITHUB_TOKEN
          rm -rf /tmp/aapD /tmp/emptyhome
          mkdir -p /tmp/emptyhome
          HOME=/tmp/emptyhome GIT_CONFIG_NOSYSTEM=1 GIT_TERMINAL_PROMPT=0 \
            git -c credential.helper= -c http.extraheader= \
            clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aapD 2>&1 | tail -5 \
            && echo "D_OK" || echo "D_FAIL"
          rm -rf /tmp/aapD /tmp/emptyhome
