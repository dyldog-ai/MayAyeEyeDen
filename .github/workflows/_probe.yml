name: Probe dep-fetch methods

on:
  push:
    branches: [probe-fix]

jobs:
  checkout-no-persist:
    name: checkout-no-persist
    runs-on: macos-latest
    steps:
      - name: Checkout with persist-credentials false
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Clone public package (stands in for SwiftPM)
        run: |
          rm -rf /tmp/aap
          git clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aap 2>&1 | tail -3 \
            && echo "NO_PERSIST_OK" || echo "NO_PERSIST_FAIL"
          rm -rf /tmp/aap

  strip-and-clone:
    name: strip-and-clone
    runs-on: macos-latest
    steps:
      - name: Checkout (default) then strip injected cred, clone
        uses: actions/checkout@v4
      - name: Strip injected credential and clone
        run: |
          rm -rf /tmp/aap
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all credential.helper || true
          git clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aap 2>&1 | tail -3 \
            && echo "STRIP_OK" || echo "STRIP_FAIL"
          rm -rf /tmp/aap
