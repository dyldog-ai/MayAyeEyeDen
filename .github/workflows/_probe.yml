name: Probe dep-fetch methods

on:
  push:
    branches: [probe-fix]

jobs:
  anon-strip-creds:
    name: anon-strip-creds
    runs-on: macos-latest
    steps:
      - name: Strip injected credential config, then anonymous HTTPS clone
        run: |
          rm -rf /tmp/aap
          unset GITHUB_TOKEN
          git config --global --unset credential.helper || true
          git config --global --unset http.extraheader || true
          GIT_TERMINAL_PROMPT=0 git -c credential.helper= -c http.extraheader= \
            clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aap 2>&1 | tail -3 \
            && echo "STRIP_OK" || echo "STRIP_FAIL"
          rm -rf /tmp/aap

  anon-sterile-home:
    name: anon-sterile-home
    runs-on: macos-latest
    steps:
      - name: Truly anonymous clone in sterile HOME
        run: |
          rm -rf /tmp/aap /tmp/emptyhome
          mkdir -p /tmp/emptyhome
          HOME=/tmp/emptyhome GIT_CONFIG_NOSYSTEM=1 GIT_TERMINAL_PROMPT=0 \
            git -c credential.helper= -c http.extraheader= \
            clone --depth 1 https://github.com/apple/apple-argument-parser.git /tmp/aap 2>&1 | tail -3 \
            && echo "STERILE_OK" || echo "STERILE_FAIL"
          rm -rf /tmp/aap /tmp/emptyhome
